<!DOCTYPE html>
<html>
<head>
<style>
body {
    background-color: #faf8ef;
    font-family: 'Clear Sans', sans-serif;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
}
#main-screen, #game-screen {
    position: absolute;
    width: 340px;
    text-align: center;
}
#game-screen {
    display: none;
}

.btn {
    background: #8f7a66;
    color: white;
    border: none;
    padding: 15px 30px;
    font-size: 20px;
    border-radius: 5px;
    cursor: pointer;
    margin: 10px 10px 5px;
    font-weight: bold;
}
.instruction-text {
    color: #776e65;
    font-size: 14px;
    font-weight: bold;
    margin-bottom: 20px;
}
.volume-box {
    margin: 25px;
    color: #776e65;
    font-weight: bold;
}
input[type=range] {
    width: 150px;
    cursor: pointer;
    accent-color: #8f7a66;
}
#score {
    background: #bbada0;
    color: white;
    padding: 10px 20px;
    border-radius: 5px;
    margin-bottom: 10px;
    display: inline-block;
    font-weight: bold;
}

#game-container {
    position: relative;
    width: 320px;
    height: 320px;
    background: #bbada0;
    border-radius: 6px;
    padding: 10px;
    margin: 0 auto;
}
.grid-cell {
    width: 72.5px;
    height: 72.5px;
    background: rgba(238, 228, 218, 0.35);
    border-radius: 3px;
    position: absolute;
}
.tile {
    width: 72.5px;
    height: 72.5px;
    position: absolute;
    border-radius: 3px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 32px;
    font-weight: bold;
    color: #776e65;
    transition: transform 110ms ease-in-out, background-color 110ms;
    z-index: 10;
}

.tile-2 { background: #eee4da; }
.tile-4 { background: #ede0c8; }
.tile-8 { background: #f2b179; color: #f9f6f2; }
.tile-16 { background: #f59563; color: #f9f6f2; }
.tile-32 { background: #f67c5f; color: #f9f6f2; }
.tile-64 { background: #f65e3b; color: #f9f6f2; }
</style>
</head>
<body>

<div id="main-screen">
    <h1 style="color: #776e65; font-size: 70px; margin: 0;">2048</h1>
    <button class="btn" onclick="startGame()">Play Game</button>
    <p class="instruction-text">Use Arrow Keys to Move</p>
    <div class="volume-box">Volume Control<br><input type="range" min="0" max="1" step="0.1" value="0.5"></div>
</div>

<div id="game-screen">
    <div id="score">Score: <span id="score-val">0</span></div>
    <div id="game-container">
        <script>
            for(let i=0; i<16; i++) {
                let r = Math.floor(i/4), c = i%4;
                document.write(`<div class="grid-cell" style="top:${10+r*77.5}px; left:${10+c*77.5}px"></div>`);
            }
        </script>
    </div>
    <button class="btn" style="padding: 8px 15px; font-size: 14px;" onclick="location.reload()">Quit</button>
</div>

<script>
let board = Array(4).fill().map(() => Array(4).fill(0));
let score = 0;
let tiles = [];

function startGame() {
    document.getElementById('main-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'block';
    addTile();
    addTile();
    render();
}

function addTile() {
    let empty = [];
    board.forEach((r, i) => r.forEach((v, j) => {
        if(!v) empty.push([i, j]);
    }));
    if(empty.length) {
        let [r, c] = empty[Math.floor(Math.random() * empty.length)];
        board[r][c] = Math.random() < 0.9 ? 2 : 4;
    }
}

function render() {
    const container = document.getElementById('game-container');
    document.querySelectorAll('.tile').forEach(t => t.remove());
    board.forEach((row, r) => row.forEach((v, c) => {
        if(v) {
            const t = document.createElement('div');
            t.className = `tile tile-${v}`;
            t.innerText = v;
            t.style.top = (10 + r * 77.5) + 'px';
            t.style.left = (10 + c * 77.5) + 'px';
            container.appendChild(t);
        }
    }));
    document.getElementById('score-val').innerText = score;
}

function slide(row) {
    let arr = row.filter(v => v);
    for (let i = 0; i < arr.length - 1; i++) {
        if (arr[i] === arr[i+1]) {
            arr[i] *= 2;
            score += arr[i];
            arr[i+1] = 0;
        }
    }
    arr = arr.filter(v => v);
    while (arr.length < 4) arr.push(0);
    return arr;
}

window.addEventListener('keydown', e => {
    if (document.getElementById('game-screen').style.display === 'none') return;
    if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(e.code)) e.preventDefault();
    let old = JSON.stringify(board);
    
    if (e.key === 'ArrowLeft') board = board.map(r => slide(r));
    if (e.key === 'ArrowRight') board = board.map(r => slide(r.reverse()).reverse());
    if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
        board = board.map((_, i) => board.map(r => r[i]));
        if (e.key === 'ArrowUp') board = board.map(r => slide(r));
        else board = board.map(r => slide(r.reverse()).reverse());
        board = board.map((_, i) => board.map(r => r[i]));
    }
    
    if (old !== JSON.stringify(board)) {
        addTile();
        render();
    }
});
</script>
</body>
</html>
