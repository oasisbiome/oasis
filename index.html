<!DOCTYPE html>
<html>
<style>
    h1 {
    font-family: monospace;
    font-variant: small-caps;
    }
    .btn {
    padding: 12.5px 25px;
    font-size: 16px;
    font-weight: 600;
    background-color: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(5px);
    border: 1px solid rgba(255, 255, 255, 0.3);
    color: #006580;
    border-radius: 50px;
    cursor: pointer;
    transition: transform 0.3s ease, background-color 0.3s ease, box-shadow 0.3s ease;
    text-decoration: none;
    display: inline-block;
    text-decoration: none;
    display: inline-block;
    }
    .btn:hover {
    transform: scale(1.08);
    background-color: rgba(255, 255, 255, 0.25);
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
    }
    .btn:active {
    transform: scale(0.95);
    }
    body {
    text-align: center;
    padding-top: 20vh;
    }
</style>


<head>
    <title>My Apps</title>
    <link rel="icon" type="image/jpeg" href="https://pbs.twimg.com/profile_images/1179529603624226818/oGF_v7IC.jpg">
</head>


<body>
    <h1>Oasis Games</h1>
    <a href="eaglercraft.html" class="btn">Eaglercraft Tuffclient</a>
</body>


<script>
    document.querySelectorAll('.btn').forEach(link => {
        link.addEventListener('click', function(event) {
            event.preventDefault();
            const fileUrl = this.getAttribute('href');
            
            // Ask the user: OK = True (Use Proxy), Cancel = False (Normal Tab)
            const useProxy = confirm("Do you want to use an about:blank proxy?");

            if (useProxy) {
                // Your original about:blank proxy logic
                const blankWindow = window.open('about:blank', '_blank');
                if (blankWindow) {
                    const doc = blankWindow.document;
                    doc.body.style.margin = '0';
                    doc.body.style.overflow = 'hidden';

                    const iframe = doc.createElement('iframe');
                    iframe.src = fileUrl;
                    iframe.style.width = '100vw';
                    iframe.style.height = '100vh';
                    iframe.style.border = 'none';

                    doc.body.appendChild(iframe);
                }
            } else {
                // Launch the HTML file normally in a new tab
                window.open(fileUrl, '_blank');
            }
        });
    });
</script>
</html>
