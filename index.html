<!DOCTYPE html>
<html>

<style>
    .btn {
    padding: 12.5px 25px;
    font-size: 16px;
    font-weight: 600;
    background-color: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(5px); /* Smooth background glass effect */
    border: 1px solid rgba(255, 255, 255, 0.3);
    color: #ffffff;
    border-radius: 50px;
    cursor: pointer;
    transition: transform 0.3s ease, background-color 0.3s ease, box-shadow 0.3s ease;
    }
    .modern-btn:hover {
    transform: scale(1.08); /* Makes the button 8% bigger */
    background-color: rgba(255, 255, 255, 0.25);
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
    }
    .modern-btn:active {
    transform: scale(0.95);
    }

</style>


<head>
    <title>My Apps</title>
    <link rel="icon" type="image/jpeg" href="https://pbs.twimg.com/profile_images/1179529603624226818/oGF_v7IC.jpg">
</head>


<body>
    <a href="https://www.google.com" class="btn">Google</a>
</body>


<script>
    document.querySelectorAll('.btn').forEach(link => {
        link.addEventListener('click', function(event) {
            event.preventDefault();
            const fileUrl = this.getAttribute('href');
            const blankWindow = window.open('about:blank', '_blank');

            if (blankWindow) {
                const doc = blankWindow.document;
                doc.body.style.margin = '0';
                doc.body.style.overflow = 'hidden';

                const iframe = doc.createElement('iframe');
                iframe.src = window.location.origin + '/' + fileUrl;
                iframe.style.width = '100vw';
                iframe.style.height = '100vh';
                iframe.style.border = 'none';

                doc.body.appendChild(iframe);
            }
        });
    });
</script>

</html>
