<!DOCTYPE html>
<html>
<style>
    h1 {
    font-family: monospace;
    font-variant: small-caps;
    }
    .btn {
    padding: 12.5px 25px;
    font-size: 16px;
    font-weight: 600;
    background-color: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(5px);
    border: 1px solid rgba(255, 255, 255, 0.3);
    color: #006580;
    border-radius: 50px;
    cursor: pointer;
    transition: transform 0.3s ease, background-color 0.3s ease, box-shadow 0.3s ease;
    text-decoration: none;
    display: inline-block;
    text-decoration: none;
    display: inline-block;
    }
    .btn:hover {
    transform: scale(1.08);
    background-color: rgba(255, 255, 255, 0.25);
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
    }
    .btn:active {
    transform: scale(0.95);
    }
    body {
    text-align: center;
    padding-top: 20vh;
    }
</style>


<head>
    <title>My Apps</title>
    <link rel="icon" type="image/jpeg" href="https://pbs.twimg.com/profile_images/1179529603624226818/oGF_v7IC.jpg">
</head>


<body>
    <h1>Oasis Games</h1>
    <a href="eaglercraft.html" class="btn">Eaglercraft Tuffclient</a>
</body>


<script>
    // 1. Injected styles required for the modal layout
    const styles = `
        .app-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: #fff;
            z-index: 99999;
            display: none;
        }
        .app-overlay iframe {
            width: 100%; height: 100%;
            border: none;
        }
    `;
    const styleSheet = document.createElement("style");
    styleSheet.innerText = styles;
    document.head.appendChild(styleSheet);

    // 2. Main execution logic
    document.querySelectorAll('.btn').forEach(link => {
        link.addEventListener('click', function(event) {
            event.preventDefault();
            const fileUrl = this.getAttribute('href');

            // Cache original tab properties to restore them later if needed
            const originalTitle = document.title;
            const originalFavicon = document.querySelector("link[rel~='icon']")?.href;

            // Dynamically alter the main browser tab elements
            document.title = "My Apps";
            let favicon = document.querySelector("link[rel~='icon']");
            if (!favicon) {
                favicon = document.createElement('link');
                favicon.rel = 'icon';
                document.head.appendChild(favicon);
            }
            favicon.href = 'https://twimg.com';

            // Create or query the fullscreen container view
            let overlay = document.querySelector('.app-overlay');
            if (!overlay) {
                overlay = document.createElement('div');
                overlay.className = 'app-overlay';
                
                const iframe = document.createElement('iframe');
                overlay.appendChild(iframe);
                document.body.appendChild(overlay);
            }

            // Load target link inside the iframe viewport
            overlay.querySelector('iframe').src = fileUrl;
            overlay.style.display = 'block';

            // Handle the back / browser history navigation state naturally
            window.history.pushState({ overlayOpen: true }, "");

            window.addEventListener('popstate', function() {
                overlay.style.display = 'none';
                overlay.querySelector('iframe').src = 'about:blank';
                document.title = originalTitle;
                if (favicon && originalFavicon) favicon.href = originalFavicon;
            }, { once: true });
        });
    });
</script>


</html>
