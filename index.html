<!DOCTYPE html>
<html>
<style>
    h1 {
    font-family: monospace;
    font-variant: small-caps;
    }
    .btn {
    padding: 12.5px 25px;
    font-size: 16px;
    font-weight: 600;
    background-color: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(5px);
    border: 1px solid rgba(255, 255, 255, 0.3);
    color: #006580;
    border-radius: 50px;
    cursor: pointer;
    transition: transform 0.3s ease, background-color 0.3s ease, box-shadow 0.3s ease;
    text-decoration: none;
    display: inline-block;
    text-decoration: none;
    display: inline-block;
    }
    .btn:hover {
    transform: scale(1.08);
    background-color: rgba(255, 255, 255, 0.25);
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
    }
    .btn:active {
    transform: scale(0.95);
    }
    body {
    text-align: center;
    padding-top: 20vh;
    }
</style>


<head>
    <title>My Apps</title>
    <link rel="icon" type="image/jpeg" href="https://pbs.twimg.com/profile_images/1179529603624226818/oGF_v7IC.jpg">
</head>


<body>
    <h1>Oasis Games</h1>
    <a href="eaglercraft.html" class="btn">Eaglercraft Tuffclient</a>
</body>


<script>
    document.querySelectorAll('.btn').forEach(link => {
        link.addEventListener('click', function(event) {
            event.preventDefault();
            const fileUrl = this.getAttribute('href');

            const htmlContent = `
                <!DOCTYPE html>
                <html>
                <head>
                    <title>My Apps</title>
                    <link rel="icon" type="image/jpeg" href="https://twimg.com">
                    <style>
                        body { margin: 0; overflow: hidden; }
                        iframe { width: 100vw; height: 100vh; border: none; }
                    </style>
                </head>
                <body>
                    <iframe src="${fileUrl}"></iframe>
                </body>
                </html>
            `;

            const blob = new Blob([htmlContent], { type: 'text/html' });
            const blobUrl = URL.createObjectURL(blob);

            window.open(blobUrl, '_blank');
        });
    });
</script>


</html>
