<!DOCTYPE html>
<html>
<head>
    <title>Under Construction</title>
    <style>
        /* This centers everything on the screen and changes the font */
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f0f0f0;
            margin-top: 100px;
        }

        /* This styles the container box */
        .box {
            background-color: white;
            width: 400px;
            margin: 0 auto;
            padding: 30px;
            border: 2px solid #cccccc;
            border-radius: 10px;
        }

        /* This styles our return link to look like a button */
        .button {
            display: inline-block;
            background-color: blue;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 15px;
        }

        .button:hover {
            background-color: darkblue;
        }
    </style>
</head>
<body>

    <div class="box">
        <h1>Under Construction</h1>
        <p>This page is currently being worked on. Please check back later!</p>
        
        <!-- Change "index.html" to the name of your main homepage file -->
        <a href="index.html" class="button">Go Back Home</a>
    </div>

</body>
</html>
